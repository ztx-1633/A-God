<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - A股智能分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .login-form {
            padding: 40px 30px;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .switch-form {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
        .switch-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .switch-form a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-container">
                    <!-- 登录表单 -->
                    <div id="login-form">
                        <div class="login-header">
                            <h2>🚀 A股智能分析平台</h2>
                            <p>登录您的账户</p>
                        </div>
                        <div class="login-form">
                            <div id="login-alerts"></div>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <input type="text" class="form-control" id="loginUsername" 
                                           placeholder="用户名" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" id="loginPassword" 
                                           placeholder="密码" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-login">
                                    登录
                                </button>
                            </form>
                            <div class="switch-form">
                                还没有账户？<a href="#" onclick="showRegister()">立即注册</a>
                            </div>
                        </div>
                    </div>

                    <!-- 注册表单 -->
                    <div id="register-form" style="display: none;">
                        <div class="login-header">
                            <h2>📝 创建账户</h2>
                            <p>加入A股智能分析平台</p>
                        </div>
                        <div class="login-form">
                            <div id="register-alerts"></div>
                            <form id="registerForm">
                                <div class="mb-3">
                                    <input type="text" class="form-control" id="registerUsername" 
                                           placeholder="用户名" required>
                                </div>
                                <div class="mb-3">
                                    <input type="email" class="form-control" id="registerEmail" 
                                           placeholder="邮箱地址" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" id="registerPassword" 
                                           placeholder="密码" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" id="confirmPassword" 
                                           placeholder="确认密码" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-login">
                                    注册
                                </button>
                            </form>
                            <div class="switch-form">
                                已有账户？<a href="#" onclick="showLogin()">立即登录</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        function showAlert(containerId, message, type = 'danger') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById(containerId).innerHTML = alertHtml;
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(response) {
                if (response.success) {
                    showAlert('login-alerts', '登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert('login-alerts', response.message || '登录失败');
                }
            })
            .catch(function() {
                showAlert('login-alerts', '网络错误，请稍后重试');
            });
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('register-alerts', '两次输入的密码不一致');
                return;
            }
            
            fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(response) {
                if (response.success) {
                    showAlert('register-alerts', '注册成功！请登录', 'success');
                    setTimeout(() => {
                        showLogin();
                    }, 2000);
                } else {
                    showAlert('register-alerts', response.message || '注册失败');
                }
            })
            .catch(function() {
                showAlert('register-alerts', '网络错误，请稍后重试');
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
