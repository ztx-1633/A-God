<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股智能分析平台 - 奢华版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* 全局样式 */
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #f5f5f5;
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 100%);
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d4af37 !important;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }
        
        /* 搜索框 */
        .stock-search {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            border-radius: 30px;
            color: #d4af37;
            padding: 12px 24px;
            transition: all 0.3s ease;
        }
        
        .stock-search:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #f4d03f;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            color: #f4d03f;
        }
        
        .stock-search::placeholder {
            color: rgba(212, 175, 55, 0.5);
        }
        
        /* 按钮样式 */
        .btn {
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .btn-outline-light {
            border-color: #d4af37;
            color: #d4af37;
        }
        
        .btn-outline-light:hover {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        
        .btn-light {
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #0a0a0a;
            border-color: #d4af37;
        }
        
        .btn-light:hover {
            background: linear-gradient(135deg, #f4d03f 0%, #d4af37 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #0a0a0a;
            border-color: #d4af37;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #f4d03f 0%, #d4af37 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        
        /* 卡片样式 */
        .dashboard-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(42, 42, 42, 0.8) 100%);
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
            border-color: #f4d03f;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #0a0a0a;
            border: none;
        }
        
        .metric-card:hover {
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.5);
        }
        
        /* 图表容器 */
        .chart-container {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(42, 42, 42, 0.8) 100%);
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        /* 标题样式 */
        h2, h3, h5, h6 {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* 信号样式 */
        .signal-buy { color: #27ae60; font-weight: bold; text-shadow: 0 0 10px rgba(39, 174, 96, 0.5); }
        .signal-sell { color: #e74c3c; font-weight: bold; text-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .signal-hold { color: #f39c12; font-weight: bold; text-shadow: 0 0 10px rgba(243, 156, 18, 0.5); }
        
        /* 文本样式 */
        .text-muted {
            color: rgba(212, 175, 55, 0.6) !important;
        }
        
        /* 欢迎信息 */
        #welcome-msg {
            color: #d4af37;
            font-weight: bold;
        }
        
        /* 加载动画 */
        .spinner-border {
            border-color: #d4af37;
            border-top-color: transparent;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.2rem;
            }
            
            .stock-search {
                width: 100% !important;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">⚜️ A股智能分析平台 ⚜️</a>
            <div class="navbar-nav ms-auto">
                <!-- 登录/注册导航项 -->
                <div id="auth-nav" class="d-flex align-items-center">
                    <input type="text" class="form-control stock-search me-2" id="stockSearch" 
                           placeholder="输入股票代码..." style="width: 250px;">
                    <a href="/login" class="btn btn-outline-light me-2" id="login-btn">登录</a>
                    <a href="/register" class="btn btn-light" id="register-btn">注册</a>
                </div>
                <!-- 用户信息导航项 -->
                <div id="user-nav" class="d-flex align-items-center" style="display: none;">
                    <input type="text" class="form-control stock-search me-2" id="stockSearch2" 
                           placeholder="输入股票代码..." style="width: 250px;">
                    <span class="text-white me-3" id="welcome-msg">欢迎, <span id="username-display"></span></span>
                    <a href="#" class="btn btn-outline-light me-2" id="pricing-link">订阅</a>
                    <a href="#" class="btn btn-light" id="logout-btn">退出</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-6">
        <!-- 市场概览 -->
        <h2 class="mb-6 text-center">✨ 市场概览 ✨</h2>
        <div class="row mb-6">
            <div class="col-md-4">
                <div class="card dashboard-card metric-card">
                    <div class="card-body text-center">
                        <h5 class="text-dark">上证指数</h5>
                        <h3 id="sh-index" class="text-dark">--</h3>
                        <p id="sh-change" class="mb-0 text-dark">--</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card metric-card">
                    <div class="card-body text-center">
                        <h5 class="text-dark">深证成指</h5>
                        <h3 id="sz-index" class="text-dark">--</h3>
                        <p id="sz-change" class="mb-0 text-dark">--</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card metric-card">
                    <div class="card-body text-center">
                        <h5 class="text-dark">创业板指</h5>
                        <h3 id="cy-index" class="text-dark">--</h3>
                        <p id="cy-change" class="mb-0 text-dark">--</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 股票分析区域 -->
        <div id="stock-analysis" style="display: none;">
            <h3 id="stock-title" class="text-center mb-6">股票分析</h3>
            
            <!-- 实时数据 -->
            <div class="row mb-6">
                <div class="col-md-3">
                    <div class="card dashboard-card">
                        <div class="card-body text-center">
                            <h6>当前价格</h6>
                            <h4 id="current-price">--</h4>
                            <small id="price-change" class="text-muted">--</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card dashboard-card">
                        <div class="card-body text-center">
                            <h6>交易信号</h6>
                            <h4 id="trading-signal">--</h4>
                            <small class="text-muted">智能推荐</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card dashboard-card">
                        <div class="card-body text-center">
                            <h6>RSI</h6>
                            <h4 id="rsi-value">--</h4>
                            <small class="text-muted">相对强弱指数</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card dashboard-card">
                        <div class="card-body text-center">
                            <h6>PE比率</h6>
                            <h4 id="pe-ratio">--</h4>
                            <small class="text-muted">市盈率</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 价格图表 -->
            <div class="chart-container">
                <h5 class="text-center mb-4">价格走势图</h5>
                <canvas id="priceChart" width="400" height="200"></canvas>
            </div>

            <!-- 预测结果 -->
            <div class="chart-container" id="prediction-section">
                <h5 class="text-center mb-4">价格预测</h5>
                <div id="prediction-results" class="text-center">
                    <p class="text-muted">点击"获取预测"按钮查看AI预测结果</p>
                </div>
                <div class="text-center mt-4">
                    <button class="btn btn-primary" onclick="getPrediction()" id="predict-btn">获取预测</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStock = null;
        let priceChart = null;

        // 页面加载时获取市场概览
        document.addEventListener('DOMContentLoaded', function() {
            // 检查用户登录状态
            checkAuthStatus();
            
            // 设置股票搜索
            setupStockSearch();
        });
        
        // 检查用户登录状态
        function checkAuthStatus() {
            fetch('/api/auth/status')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.authenticated) {
                        // 用户已登录
                        document.getElementById('auth-nav').style.display = 'none';
                        document.getElementById('user-nav').style.display = 'block';
                        document.getElementById('username-display').textContent = data.username;
                        
                        // 根据付费状态控制预测功能
                        if (!data.is_paid) {
                            const predictBtn = document.getElementById('predict-btn');
                            predictBtn.disabled = true;
                            predictBtn.textContent = '订阅后可使用预测功能';
                            predictBtn.addEventListener('click', function(e) {
                                e.preventDefault();
                                window.location.href = '/pricing';
                            });
                        }
                    } else {
                        // 用户未登录
                        document.getElementById('auth-nav').style.display = 'block';
                        document.getElementById('user-nav').style.display = 'none';
                        
                        // 未登录用户禁用预测功能
                        const predictBtn = document.getElementById('predict-btn');
                        predictBtn.disabled = true;
                        predictBtn.textContent = '登录后可使用预测功能';
                        predictBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            window.location.href = '/login';
                        });
                    }
                    
                    // 加载市场概览
                    loadMarketOverview();
                })
                .catch(function() {
                    // 请求失败，默认显示未登录状态
                    document.getElementById('auth-nav').style.display = 'block';
                    document.getElementById('user-nav').style.display = 'none';
                    
                    // 未登录用户禁用预测功能
                    const predictBtn = document.getElementById('predict-btn');
                    predictBtn.disabled = true;
                    predictBtn.textContent = '登录后可使用预测功能';
                    predictBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        window.location.href = '/login';
                    });
                    
                    // 加载市场概览
                    loadMarketOverview();
                });
        }
        
        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            fetch('/api/auth/logout', {
                method: 'POST'
            })
            .then(function() {
                window.location.reload();
            })
            .catch(function() {
                alert('退出登录失败');
            });
        });
        
        // 订阅链接
        document.getElementById('pricing-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/pricing';
        });

        // 加载市场概览
        function loadMarketOverview() {
            fetch('/api/market/overview')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.success) {
                        updateMarketData(data.data);
                    }
                })
                .catch(function() {
                    console.log('获取市场数据失败');
                });
        }

        // 更新市场数据
        function updateMarketData(data) {
            if (data.indices) {
                // 更新指数数据
                Object.keys(data.indices).forEach(function(key) {
                    let index = data.indices[key];
                    if (index.price) {
                        let elementId = key === '上证指数' ? 'sh' : key === '深证成指' ? 'sz' : 'cy';
                        document.getElementById(elementId + '-index').textContent = index.price;
                        document.getElementById(elementId + '-change').textContent = index.change + '%';
                    }
                });
            }

            // 更新市场统计
            if (data.rising_stocks && document.getElementById('rising-count')) {
                document.getElementById('rising-count').textContent = data.rising_stocks;
            }
            if (data.falling_stocks && document.getElementById('falling-count')) {
                document.getElementById('falling-count').textContent = data.falling_stocks;
            }
            if (data.unchanged_stocks && document.getElementById('unchanged-count')) {
                document.getElementById('unchanged-count').textContent = data.unchanged_stocks;
            }
            if (data.total_stocks && document.getElementById('total-count')) {
                document.getElementById('total-count').textContent = data.total_stocks;
            }
        }

        // 设置股票搜索
        function setupStockSearch() {
            const stockSearch = document.getElementById('stockSearch');
            if (stockSearch) {
                stockSearch.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        let symbol = this.value.trim();
                        if (symbol) {
                            analyzeStock(symbol);
                        }
                    }
                });
            }
        }

        // 分析股票
        function analyzeStock(symbol) {
            currentStock = symbol;
            document.getElementById('stock-analysis').style.display = 'block';
            document.getElementById('stock-title').textContent = symbol + ' - 股票分析';

            // 获取实时数据
            fetch('/api/stocks/' + symbol + '/realtime')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        updateRealtimeData(response.data);
                    }
                });

            // 获取技术分析
            fetch('/api/stocks/' + symbol + '/technical')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        updateTechnicalData(response.data);
                    }
                })
                .catch(function(xhr) {
                    if (xhr.status === 401) {
                        window.location.href = '/login';
                    }
                });

            // 获取基本面数据
            fetch('/api/stocks/' + symbol + '/fundamental')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        updateFundamentalData(response.data);
                    }
                })
                .catch(function(xhr) {
                    if (xhr.status === 401) {
                        window.location.href = '/login';
                    }
                });

            // 获取历史数据并绘制图表
            fetch('/api/stocks/' + symbol + '/data?period=3mo')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        drawPriceChart(response.data);
                    }
                });
        }

        // 更新实时数据
        function updateRealtimeData(data) {
            document.getElementById('current-price').textContent = '¥' + data.price;
            document.getElementById('price-change').textContent = data.change + ' (' + data.change_pct + '%)';
            
            let changeElement = document.getElementById('price-change');
            if (data.change > 0) {
                changeElement.classList.remove('text-danger', 'text-muted');
                changeElement.classList.add('text-success');
            } else if (data.change < 0) {
                changeElement.classList.remove('text-success', 'text-muted');
                changeElement.classList.add('text-danger');
            }
        }

        // 更新技术分析数据
        function updateTechnicalData(data) {
            if (data.indicators) {
                document.getElementById('rsi-value').textContent = data.indicators.RSI.toFixed(2);
            }
            
            if (data.signal) {
                let signal = data.signal;
                let signalElement = document.getElementById('trading-signal');
                signalElement.textContent = signal;
                
                signalElement.classList.remove('signal-buy', 'signal-sell', 'signal-hold');
                if (signal === 'BUY') {
                    signalElement.classList.add('signal-buy');
                } else if (signal === 'SELL') {
                    signalElement.classList.add('signal-sell');
                } else {
                    signalElement.classList.add('signal-hold');
                }
            }
        }

        // 更新基本面数据
        function updateFundamentalData(data) {
            if (data.financial_ratios && data.financial_ratios.pe_ratio) {
                document.getElementById('pe-ratio').textContent = data.financial_ratios.pe_ratio.toFixed(2);
            }
        }

        // 绘制价格图表
        function drawPriceChart(data) {
            let ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) {
                priceChart.destroy();
            }

            let labels = data.map(item => item.date);
            let prices = data.map(item => item.close);

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '收盘价',
                        data: prices,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // 获取预测
        function getPrediction() {
            if (!currentStock) return;

            document.getElementById('prediction-results').innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> 正在生成预测...';

            fetch('/api/predict/' + currentStock + '?days=5')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        displayPrediction(response.data);
                    } else {
                        document.getElementById('prediction-results').innerHTML = '<div class="alert alert-danger">预测失败: ' + response.error + '</div>';
                    }
                })
                .catch(function(xhr) {
                    if (xhr.status === 401) {
                        window.location.href = '/login';
                    } else {
                        document.getElementById('prediction-results').innerHTML = '<div class="alert alert-danger">网络错误，无法获取预测结果</div>';
                    }
                });
        }

        // 显示预测结果
        function displayPrediction(data) {
            let html = '<h6>未来5日价格预测</h6>';
            html += '<div class="row">';
            
            data.predictions.forEach(function(pred, index) {
                html += '<div class="col">';
                html += '<div class="card text-center">';
                html += '<div class="card-body">';
                html += '<h6 class="card-title">' + pred.date + '</h6>';
                html += '<h5 class="text-primary">¥' + pred.predicted_price + '</h5>';
                html += '<small class="text-muted">置信度: ' + (pred.confidence * 100).toFixed(1) + '%</small>';
                html += '</div></div></div>';
            });
            
            html += '</div>';
            html += '<small class="text-muted mt-2 d-block">* 预测结果仅供参考，投资有风险</small>';
            
            document.getElementById('prediction-results').innerHTML = html;
        }
    </script>
</body>
</html>
