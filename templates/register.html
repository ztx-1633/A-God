<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - A股智能分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .register-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: white;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #0d6efd;
            font-size: 28px;
            font-weight: bold;
        }
        .alert {
            display: none;
        }
    </style>
</head>
<body style="background-color: #f8f9fa;">
    <div class="register-container">
        <div class="logo">
            <h1>A股智能分析平台</h1>
            <p class="text-muted">专业的股票分析与预测工具</p>
        </div>
        
        <div id="alert" class="alert" role="alert"></div>
        
        <form id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">确认密码</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                <label class="form-check-label" for="agreeTerms">我同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></label>
            </div>
            <button type="submit" class="btn btn-primary w-100">注册</button>
        </form>
        
        <div class="text-center mt-3">
            <p class="mb-1">已有账户？<a href="/login">立即登录</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            checkAuthStatus();
            
            // 注册表单提交
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // 简单验证
                if (!username || !email || !password || !confirmPassword) {
                    showAlert('请填写所有字段', 'warning');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showAlert('两次输入的密码不一致', 'warning');
                    return;
                }
                
                if (password.length < 6) {
                    showAlert('密码长度至少6位', 'warning');
                    return;
                }
                
                if (!document.getElementById('agreeTerms').checked) {
                    showAlert('请同意服务条款和隐私政策', 'warning');
                    return;
                }
                
                // 发送注册请求
                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.success) {
                        showAlert('注册成功，正在跳转到登录页面...', 'success');
                        setTimeout(function() {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showAlert(response.error || '注册失败', 'danger');
                    }
                })
                .catch(function() {
                    showAlert('网络错误，请稍后重试', 'danger');
                });
            });
        });
        
        function checkAuthStatus() {
            fetch('/api/auth/status')
                .then(function(response) {
                    return response.json();
                })
                .then(function(response) {
                    if (response.authenticated) {
                        // 已登录，跳转到主页
                        window.location.href = '/';
                    }
                });
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.classList.remove('alert-success', 'alert-danger', 'alert-warning');
            alert.classList.add('alert-' + type);
            alert.textContent = message;
            alert.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(function() {
                alert.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
